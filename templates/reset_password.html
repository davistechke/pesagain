<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GainPesa | Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }

        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-style {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px 44px 12px 12px;
            border-radius: 12px;
            width: 100%;
            outline: none;
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }
        .input-style:focus { border-color: #facc15; }
        .input-style::placeholder { color: #4b5563; }

        .pw-wrap { position: relative; }
        .eye-btn {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            cursor: pointer; color: #6b7280;
            background: none; border: none; padding: 4px;
            transition: color 0.2s;
        }
        .eye-btn:hover { color: #facc15; }

        /* Alerts */
        .alert {
            border-radius: 12px; padding: 12px 16px; font-size: 0.8rem; font-weight: 600;
            display: flex; align-items: flex-start; gap: 10px;
            animation: slideDown 0.4s ease both;
        }
        .alert-info    { background: rgba(250,204,21,.1);  border: 1px solid rgba(250,204,21,.3); color: #fde68a; }
        .alert-error   { background: rgba(239,68,68,.12);  border: 1px solid rgba(239,68,68,.3);  color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,.1);   border: 1px solid rgba(34,197,94,.3);  color: #86efac; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Strength bar */
        .bar-wrap { display: flex; gap: 4px; margin-top: 7px; }
        .bar-wrap span {
            flex: 1; height: 3px; border-radius: 2px;
            background: rgba(255,255,255,.08);
            transition: background 0.3s;
        }
        .hint { font-size: 0.7rem; font-weight: 600; margin-top: 4px; min-height: 14px; }
        .ok  { color: #4ade80; }
        .bad { color: #f87171; }

        /* Loading */
        .spinner {
            display: none; width: 14px; height: 14px;
            border: 2px solid rgba(0,0,0,.3); border-top-color: black;
            border-radius: 50%; animation: spin .7s linear infinite;
        }
        .btn-loading .spinner   { display: inline-block; }
        .btn-loading .btn-text  { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass p-10 rounded-3xl w-full max-w-md">

        <!-- Header -->
        <h1 class="text-3xl font-black mb-1 italic">
            SET NEW<span class="text-yellow-400">PASSWORD</span>
        </h1>
        <p class="text-gray-500 mb-6 text-[10px] tracking-widest uppercase">GainPesa Account Security</p>

        <!-- Flash messages (e.g. expired / invalid token) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="space-y-3 mb-5">
              {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                  <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor"
                       stroke-width="2" viewBox="0 0 24 24">
                    {% if category == 'success' %}
                      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                    {% else %}
                      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    {% endif %}
                  </svg>
                  <span>{{ message }}</span>
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <!-- Server-side validation error (mismatch / too short) -->
        {% if error %}
          <div class="alert alert-error mb-5">
            <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor"
                 stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span>{{ error }}</span>
          </div>
        {% endif %}

        <!-- token is passed from Flask: render_template("reset_password.html", token=token) -->
        <form method="POST" action="{{ url_for('reset_password', token=token) }}"
              id="resetForm" class="space-y-5" novalidate>

            <!-- New password -->
            <div class="space-y-1">
                <label class="text-sm text-gray-400 ml-1">New Password</label>
                <div class="pw-wrap">
                    <input type="password" id="password" name="password"
                           placeholder="••••••••" class="input-style"
                           required minlength="6" autocomplete="new-password" />
                    <button type="button" class="eye-btn" id="toggle1" aria-label="Show password">
                        <svg id="eye1" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="bar-wrap">
                    <span id="b1"></span><span id="b2"></span><span id="b3"></span><span id="b4"></span>
                </div>
                <div class="hint" id="strengthHint"></div>
            </div>

            <!-- Confirm password -->
            <div class="space-y-1">
                <label class="text-sm text-gray-400 ml-1">Confirm Password</label>
                <div class="pw-wrap">
                    <input type="password" id="confirm_password" name="confirm_password"
                           placeholder="••••••••" class="input-style"
                           required autocomplete="new-password" />
                    <button type="button" class="eye-btn" id="toggle2" aria-label="Show confirm password">
                        <svg id="eye2" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="hint" id="matchHint"></div>
            </div>

            <button id="submitBtn" type="submit"
                class="w-full bg-yellow-400 text-black font-bold py-3 rounded-xl
                       hover:bg-yellow-500 transition uppercase text-sm
                       flex items-center justify-center gap-2">
                <span class="spinner"></span>
                <span class="btn-text">Update Password</span>
            </button>
        </form>

        <p class="text-center mt-8">
            <a href="{{ url_for('login') }}" class="text-gray-500 text-sm hover:text-white transition">
                ← Back to Login
            </a>
        </p>
    </div>

    <script>
        // ── Toggle show/hide ─────────────────────────────────────────
        function makeToggle(btnId, inputId, eyeId) {
            document.getElementById(btnId).addEventListener('click', function () {
                const inp = document.getElementById(inputId);
                const eye = document.getElementById(eyeId);
                const showing = inp.type === 'text';
                inp.type = showing ? 'password' : 'text';
                eye.innerHTML = showing
                    ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
                    : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            });
        }
        makeToggle('toggle1', 'password', 'eye1');
        makeToggle('toggle2', 'confirm_password', 'eye2');

        // ── Strength meter ───────────────────────────────────────────
        const bars   = ['b1','b2','b3','b4'].map(id => document.getElementById(id));
        const sHint  = document.getElementById('strengthHint');
        const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
        const labels = ['Too short','Weak','Fair','Strong'];

        function calcStrength(pw) {
            let s = 0;
            if (pw.length >= 6)  s++;
            if (pw.length >= 10) s++;
            if (/[A-Z]/.test(pw) || /[0-9]/.test(pw)) s++;
            if (/[^A-Za-z0-9]/.test(pw)) s++;
            return Math.min(s, 4);
        }

        document.getElementById('password').addEventListener('input', function () {
            const v = this.value, score = v.length ? calcStrength(v) : 0;
            bars.forEach((b, i) => b.style.background = i < score ? colors[score-1] : 'rgba(255,255,255,.08)');
            sHint.textContent = v.length ? labels[score-1] : '';
            sHint.style.color = v.length ? colors[score-1] : '';
            checkMatch();
        });

        // ── Match hint ───────────────────────────────────────────────
        const mHint = document.getElementById('matchHint');

        function checkMatch() {
            const p = document.getElementById('password').value;
            const c = document.getElementById('confirm_password').value;
            if (!c) { mHint.textContent = ''; mHint.className = 'hint'; return; }
            if (p === c) { mHint.textContent = '✓ Passwords match';       mHint.className = 'hint ok'; }
            else         { mHint.textContent = '✗ Passwords do not match'; mHint.className = 'hint bad'; }
        }
        document.getElementById('confirm_password').addEventListener('input', checkMatch);

        // ── Submit guard ─────────────────────────────────────────────
        document.getElementById('resetForm').addEventListener('submit', function (e) {
            const p = document.getElementById('password').value;
            const c = document.getElementById('confirm_password').value;
            if (p.length < 6) {
                e.preventDefault();
                mHint.textContent = '✗ Password must be at least 6 characters';
                mHint.className = 'hint bad'; return;
            }
            if (p !== c) {
                e.preventDefault();
                mHint.textContent = '✗ Passwords do not match';
                mHint.className = 'hint bad'; return;
            }
            const btn = document.getElementById('submitBtn');
            btn.classList.add('btn-loading');
            btn.disabled = true;
        });
    </script>

</body>
</html>
