<!DOCTYPE html>
<html>
<head>
    <title>GainPesa Admin | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">
    <form method="POST" class="bg-slate-800 p-8 rounded-xl shadow-2xl w-96 border border-blue-500/30">
        <h2 class="text-white text-2xl font-bold mb-6 text-center">Admin Access</h2>
        <input type="text" name="username" placeholder="Username" class="w-full mb-4 p-3 rounded bg-slate-700 text-white outline-none">
        <input type="password" name="password" placeholder="Password" class="w-full mb-6 p-3 rounded bg-slate-700 text-white outline-none">
        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition">Login</button>
    </form>
</body>
</html>
