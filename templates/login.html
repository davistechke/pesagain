<!DOCTYPE html>
<html>
<head>
    <title>Login | GenZICT</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            background: #3b82f6;
            color: white;
        }
        a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Login</h2>
    <form method="POST">
        <input name="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Password" required>
        <button>Login</button>
    </form>
    <p><a href="/forgot-password">Forgot Password?</a></p>
    <p><a href="/signup">Create account</a></p>
</div>
</body>
</html>
